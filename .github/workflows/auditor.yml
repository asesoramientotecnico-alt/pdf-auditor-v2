name: Auditor PDF Famiq

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de auditoría'
        type: choice
        options:
          - sync
          - batch
        default: sync

permissions:
  id-token: write
  contents: read

jobs:
  audit:
    name: Ejecutar auditoria semanal
    runs-on: self-hosted
    timeout-minutes: 360

    env:
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      AUDIT_MODE: ${{ inputs.mode }}
      CONCURRENCY: '8'
      REPORT_RECIPIENT: jortiz@famiq.com.ar
      INPUT_XLSX: prueba_robot_FT_2.xlsx
      SPREADSHEET_ID: 1QYT15W8NJ5M2UPVyvBy-QqfnOA4fEbTbbZfy7qrNLrY
      INPUT_SHEET: Hoja2
      OUTPUT_XLSX: Reporte_Auditoria_IA.xlsx
      ONEDRIVE_USER: ${{ secrets.ONEDRIVE_USER }}
      ONEDRIVE_PASS: ${{ secrets.ONEDRIVE_PASS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SA_EMAIL }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run auditor
        run: node index.js

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-auditoria-ia
          path: Reporte_Auditoria_IA.xlsx
          if-no-files-found: warn

      - name: Upload checkpoint on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: checkpoint
          path: checkpoint.json
          if-no-files-found: ignore

      - name: Cleanup credentials
        if: always()
        shell: cmd
        run: if exist credentials.json del /f credentials.json
